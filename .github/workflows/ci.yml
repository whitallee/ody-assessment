name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generated files are gitignored, so regenerate them before typechecking.
      # If a backend schema change breaks the dashboard's types, typecheck will catch it.
      - name: Generate contract
        run: pnpm gen:contract

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
