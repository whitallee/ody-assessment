name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test · Generated files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # ── Staleness check ──────────────────────────────────────────────────
      # Regenerate the OpenAPI spec and Orval hooks, then fail if the
      # committed generated files don't match. Forces devs to run
      # `pnpm gen:contract` and commit the output whenever the backend
      # schema or routes change.
      - name: Regenerate contract
        run: pnpm gen:contract

      - name: Assert generated files are up to date
        run: |
          if ! git diff --exit-code \
                services/backend/openapi.json \
                packages/api-client/src/generated/index.ts; then
            echo ""
            echo "Generated files are stale. Run 'pnpm gen:contract' locally and commit the result."
            exit 1
          fi
